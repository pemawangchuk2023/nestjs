<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1160" height="760" fill="#F6F8FB"/>
  <text x="580" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Chapter 1: Basic Payments Flow</text>
  <text x="580" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#536176">GET /payments returns the accounting payment list.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="95" y="138" width="240" height="74" rx="8" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="215" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">HTTP Request</text>
  <text x="215" y="193" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#9A3412">GET /payments</text>

  <rect x="430" y="130" width="360" height="90" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="610" y="166" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">AppModule</text>
  <text x="610" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#475569">imports: [PaymentsModule]</text>

  <line x1="335" y1="175" x2="418" y2="175" stroke="#F97316" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="610" y1="220" x2="610" y2="276" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="320" y="288" width="580" height="118" rx="8" fill="#EEF6FF" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="610" y="325" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsModule</text>
  <text x="610" y="354" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#1E40AF">controllers: [PaymentsController]</text>
  <text x="610" y="379" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#1E40AF">providers: [PaymentsService]</text>

  <line x1="470" y1="406" x2="330" y2="478" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="750" y1="406" x2="890" y2="478" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="95" y="490" width="410" height="132" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="300" y="528" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsController</text>
  <text x="300" y="557" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Controller('payments')</text>
  <text x="300" y="583" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Get() findAll()</text>
  <text x="300" y="608" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#2563EB">Receives GET /payments</text>

  <rect x="655" y="490" width="410" height="132" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="860" y="528" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsService</text>
  <text x="860" y="557" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findAll()</text>
  <text x="860" y="583" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Reads payment records</text>
  <text x="860" y="608" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#2563EB">Returns payment list</text>

  <line x1="505" y1="556" x2="643" y2="556" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="574" y="539" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2563EB">calls</text>

  <rect x="260" y="670" width="640" height="54" rx="8" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="580" y="703" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#166534">Response: [BTN-001 paid, BTN-002 pending]</text>

  <line x1="860" y1="622" x2="760" y2="670" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="300" y1="622" x2="400" y2="670" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
