<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1160" height="760" fill="#F8FAFC"/>
  <text x="580" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Chapter 2: Controller Route Parameters</text>
  <text x="580" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#536176">GET /payments/1 uses :id and @Param('id') to find one payment.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7C3AED"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="80" y="138" width="270" height="76" rx="8" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="215" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">HTTP Request</text>
  <text x="215" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#9A3412">GET /payments/1</text>

  <rect x="445" y="124" width="370" height="104" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="630" y="162" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsController</text>
  <text x="630" y="191" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Get(':id')</text>
  <text x="630" y="215" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findOne(@Param('id') id)</text>

  <line x1="350" y1="176" x2="433" y2="176" stroke="#F97316" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="365" y="300" width="530" height="104" rx="8" fill="#F5F3FF" stroke="#C4B5FD" filter="url(#shadow)"/>
  <text x="630" y="337" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#4C1D95">Route Param</text>
  <text x="630" y="367" text-anchor="middle" font-family="Consolas, monospace" font-size="17" fill="#5B21B6">@Param('id') reads "1"</text>
  <text x="630" y="391" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#6D28D9">URL values arrive as strings</text>

  <line x1="630" y1="228" x2="630" y2="288" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="445" y="482" width="370" height="112" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="630" y="520" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsService</text>
  <text x="630" y="550" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findOne(id)</text>
  <text x="630" y="575" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">payment.id === Number(id)</text>

  <line x1="630" y1="404" x2="630" y2="470" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="310" y="660" width="640" height="56" rx="8" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="630" y="694" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#166534">Response: { id: 1, invoiceNo: "BTN-001", status: "paid" }</text>

  <line x1="630" y1="594" x2="630" y2="648" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="875" y="135" width="220" height="86" rx="8" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="985" y="166" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1E40AF">Controller Prefix</text>
  <text x="985" y="191" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#1E40AF">@Controller('payments')</text>
  <text x="985" y="212" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#1E40AF">+ @Get(':id')</text>
</svg>
