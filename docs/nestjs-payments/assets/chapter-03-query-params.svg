<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1160" height="760" fill="#F8FAFC"/>
  <text x="580" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Chapter 03: Controller Query Parameters</text>
  <text x="580" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#536176">GET /payments?status=paid filters list data without changing the route path.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0891B2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="70" y="135" width="330" height="86" rx="8" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="235" y="166" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">HTTP Request</text>
  <text x="235" y="193" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#9A3412">GET /payments?status=paid</text>

  <rect x="500" y="125" width="380" height="106" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="690" y="163" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsController</text>
  <text x="690" y="192" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Get()</text>
  <text x="690" y="216" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findAll(@Query('status') status)</text>

  <line x1="400" y1="178" x2="488" y2="178" stroke="#F97316" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="360" y="300" width="620" height="110" rx="8" fill="#ECFEFF" stroke="#67E8F9" filter="url(#shadow)"/>
  <text x="670" y="337" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#155E75">Query Parameter</text>
  <text x="670" y="368" text-anchor="middle" font-family="Consolas, monospace" font-size="17" fill="#0E7490">@Query('status') reads "paid"</text>
  <text x="670" y="393" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0E7490">The route stays /payments; the filter lives in the query string.</text>

  <line x1="690" y1="231" x2="690" y2="288" stroke="#0891B2" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="500" y="492" width="380" height="116" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="690" y="530" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsService</text>
  <text x="690" y="560" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findAll(status)</text>
  <text x="690" y="586" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">payment.status === status</text>

  <line x1="690" y1="410" x2="690" y2="480" stroke="#0891B2" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="300" y="670" width="720" height="56" rx="8" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="660" y="704" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#166534">Response: [{ id: 1, invoiceNo: "BTN-001", status: "paid" }]</text>

  <line x1="690" y1="608" x2="690" y2="658" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="80" y="324" width="220" height="84" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="190" y="354" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">No Query?</text>
  <text x="190" y="380" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#475569">GET /payments</text>
  <text x="190" y="401" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">returns all payments</text>
</svg>
