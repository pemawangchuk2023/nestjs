<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1160" height="760" fill="#F8FAFC"/>
  <text x="580" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Chapter 04: DTOs For Request Bodies</text>
  <text x="580" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#536176">POST /payments uses @Body() and CreatePaymentDto to describe incoming JSON.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#DB2777"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="60" y="130" width="310" height="110" rx="8" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="215" y="161" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">HTTP Request</text>
  <text x="215" y="188" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#9A3412">POST /payments</text>
  <text x="215" y="214" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#9A3412">{ invoiceNo, customer, amount, status }</text>

  <rect x="480" y="130" width="380" height="110" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="670" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsController</text>
  <text x="670" y="198" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Post()</text>
  <text x="670" y="222" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">create(@Body() dto)</text>

  <line x1="370" y1="185" x2="468" y2="185" stroke="#F97316" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="350" y="310" width="640" height="116" rx="8" fill="#FDF2F8" stroke="#F9A8D4" filter="url(#shadow)"/>
  <text x="670" y="348" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#9D174D">CreatePaymentDto</text>
  <text x="670" y="378" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#BE185D">invoiceNo: string, customer: string</text>
  <text x="670" y="403" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#BE185D">amount: number, status: string</text>

  <line x1="670" y1="240" x2="670" y2="298" stroke="#DB2777" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="480" y="508" width="380" height="112" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="670" y="546" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsService</text>
  <text x="670" y="576" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">create(createPaymentDto)</text>
  <text x="670" y="601" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Adds id and stores payment in memory</text>

  <line x1="670" y1="426" x2="670" y2="496" stroke="#DB2777" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="270" y="675" width="780" height="56" rx="8" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="660" y="709" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#166534">Response: { id: 3, invoiceNo: "BTN-003", status: "pending" }</text>

  <line x1="670" y1="620" x2="670" y2="663" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="870" y="145" width="230" height="82" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="985" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">Next Chapter</text>
  <text x="985" y="202" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">ValidationPipe checks DTO values</text>
</svg>
