<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1160" height="760" fill="#F8FAFC"/>
  <text x="580" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Chapter 06: Built-In HTTP Exceptions</text>
  <text x="580" y="91" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#536176">NotFoundException turns missing payment data into a proper 404 response.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#EA580C"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="70" y="130" width="300" height="92" rx="8" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="220" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">HTTP Request</text>
  <text x="220" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="17" fill="#9A3412">GET /payments/999</text>

  <rect x="470" y="130" width="360" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="650" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsController</text>
  <text x="650" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">@Get(':id') reads "999"</text>

  <line x1="370" y1="176" x2="458" y2="176" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="470" y="305" width="360" height="108" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="650" y="343" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0F172A">PaymentsService</text>
  <text x="650" y="373" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#475569">findOne("999")</text>
  <text x="650" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Searches payments array</text>

  <line x1="650" y1="222" x2="650" y2="293" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="405" y="495" width="490" height="108" rx="8" fill="#FEF2F2" stroke="#FCA5A5" filter="url(#shadow)"/>
  <text x="650" y="533" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#991B1B">NotFoundException</text>
  <text x="650" y="563" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#B91C1C">Payment with id 999 not found</text>
  <text x="650" y="587" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#7F1D1D">NestJS converts this into HTTP 404</text>

  <line x1="650" y1="413" x2="650" y2="483" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="305" y="675" width="690" height="56" rx="8" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="650" y="709" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#991B1B">Response: { message, error: "Not Found", statusCode: 404 }</text>

  <line x1="650" y1="603" x2="650" y2="663" stroke="#DC2626" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
