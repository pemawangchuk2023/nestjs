<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="module" x1="160" y1="90" x2="1030" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12V2Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12V2Z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#0F172A}
      .small{font:500 17px Inter,Arial,sans-serif;fill:#475569}
      .label{font:700 24px Inter,Arial,sans-serif;fill:#0F172A}
      .mini{font:600 15px Inter,Arial,sans-serif;fill:#64748B}
      .num{font:800 18px Inter,Arial,sans-serif;fill:#fff}
      .thin{stroke:#334155;stroke-width:4;marker-end:url(#arrow);fill:none;stroke-linecap:round}
      .blue{stroke:#2563EB;stroke-width:4;marker-end:url(#arrowBlue);fill:none;stroke-linecap:round}
      .return{stroke:#16A34A;stroke-width:4;stroke-dasharray:10 10;marker-end:url(#arrow);fill:none;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" class="title">NestJS Request Flow</text>
  <text x="600" y="86" text-anchor="middle" class="small">Module wires Controller + Service; Service talks to data layer</text>

  <!-- Client -->
  <g filter="url(#shadow)">
    <rect x="45" y="270" width="150" height="135" rx="24" fill="#DBEAFE" stroke="#60A5FA" stroke-width="3"/>
    <circle cx="120" cy="316" r="27" fill="#2563EB"/>
    <rect x="82" y="350" width="76" height="30" rx="15" fill="#93C5FD"/>
    <text x="120" y="435" text-anchor="middle" class="label">Client</text>
  </g>

  <!-- Module boundary -->
  <g filter="url(#shadow)">
    <rect x="245" y="130" width="720" height="460" rx="34" fill="url(#module)" stroke="#FB923C" stroke-width="4" stroke-dasharray="14 10"/>
    <rect x="285" y="105" width="205" height="54" rx="18" fill="#F97316"/>
    <text x="388" y="140" text-anchor="middle" class="label" fill="#fff">Module</text>
  </g>

  <!-- Controller -->
  <g filter="url(#shadow)">
    <rect x="315" y="275" width="190" height="140" rx="26" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
    <path d="M365 324H455M365 348H430M365 372H455" stroke="#0284C7" stroke-width="8" stroke-linecap="round"/>
    <text x="410" y="452" text-anchor="middle" class="label">Controller</text>
    <text x="410" y="478" text-anchor="middle" class="mini">routes</text>
  </g>

  <!-- Service -->
  <g filter="url(#shadow)">
    <rect x="610" y="275" width="190" height="140" rx="26" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
    <circle cx="705" cy="345" r="36" fill="#16A34A" opacity="0.16"/>
    <path d="M705 306V384M666 345H744M678 318L732 372M732 318L678 372" stroke="#16A34A" stroke-width="7" stroke-linecap="round"/>
    <text x="705" y="452" text-anchor="middle" class="label">Service</text>
    <text x="705" y="478" text-anchor="middle" class="mini">business logic</text>
  </g>

  <!-- Repository -->
  <g filter="url(#shadow)">
    <rect x="858" y="280" width="86" height="130" rx="22" fill="#F3E8FF" stroke="#9333EA" stroke-width="3"/>
    <path d="M884 320H918M884 345H918M884 370H908" stroke="#9333EA" stroke-width="7" stroke-linecap="round"/>
    <text x="901" y="452" text-anchor="middle" class="mini">Repository</text>
    <text x="901" y="474" text-anchor="middle" class="mini">/ ORM</text>
  </g>

  <!-- Database -->
  <g filter="url(#shadow)">
    <ellipse cx="1090" cy="285" rx="75" ry="28" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
    <path d="M1015 285V405C1015 420 1049 433 1090 433C1131 433 1165 420 1165 405V285" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
    <ellipse cx="1090" cy="405" rx="75" ry="28" fill="#FDE68A" stroke="#D97706" stroke-width="3"/>
    <text x="1090" y="486" text-anchor="middle" class="label">Database</text>
  </g>

  <!-- Request arrows -->
  <path d="M198 330H305" class="blue"/>
  <path d="M510 330H600" class="thin"/>
  <path d="M805 330H848" class="thin"/>
  <path d="M948 330H1005" class="thin"/>

  <!-- Return arrows -->
  <path d="M1005 390H950" class="return"/>
  <path d="M848 390H805" class="return"/>
  <path d="M600 390H510" class="return"/>
  <path d="M305 390H198" class="return"/>

  <!-- Step numbers -->
  <circle cx="250" cy="330" r="18" fill="#2563EB"/><text x="250" y="336" text-anchor="middle" class="num">1</text>
  <circle cx="555" cy="330" r="18" fill="#334155"/><text x="555" y="336" text-anchor="middle" class="num">2</text>
  <circle cx="827" cy="330" r="18" fill="#334155"/><text x="827" y="336" text-anchor="middle" class="num">3</text>
  <circle cx="977" cy="330" r="18" fill="#334155"/><text x="977" y="336" text-anchor="middle" class="num">4</text>

  <!-- Minimal legend -->
  <g>
    <line x1="388" y1="620" x2="470" y2="620" class="blue"/>
    <text x="485" y="626" class="small">request</text>
    <line x1="590" y1="620" x2="672" y2="620" class="return"/>
    <text x="687" y="626" class="small">response</text>
    <text x="600" y="672" text-anchor="middle" class="small">NestJS docs concept: Controllers handle requests, Providers/Services handle logic, Modules organize dependencies.</text>
  </g>
</svg>
