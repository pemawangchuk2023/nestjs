<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#0f172a}
      .boxTitle{font:700 22px Arial,sans-serif;fill:#0f172a}
      .small{font:600 15px Arial,sans-serif;fill:#475569}
      .tiny{font:600 13px Arial,sans-serif;fill:#64748b}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .purple{stroke:#7c3aed;stroke-width:4;fill:none;marker-end:url(#purpleArrow);stroke-linecap:round}
      .return{stroke:#16a34a;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-dasharray:9 9}
    </style>
  </defs>

  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" class="title">NestJS Interceptor Flow</text>

  <!-- Client -->
  <g filter="url(#shadow)">
    <rect x="45" y="210" width="145" height="125" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="118" cy="250" r="22" fill="#2563eb"/>
    <path d="M80 302 C95 276,142 276,157 302" fill="#93c5fd"/>
    <text x="118" y="375" text-anchor="middle" class="boxTitle">Client</text>
  </g>

  <!-- Interceptor before -->
  <g filter="url(#shadow)">
    <rect x="250" y="130" width="190" height="120" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
    <text x="345" y="176" text-anchor="middle" class="boxTitle">Interceptor</text>
    <text x="345" y="205" text-anchor="middle" class="small">before</text>
    <text x="345" y="228" text-anchor="middle" class="tiny">log / change request</text>
  </g>

  <!-- Controller -->
  <g filter="url(#shadow)">
    <rect x="530" y="130" width="170" height="120" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <path d="M570 172 H660 M570 198 H645 M570 224 H660" stroke="#0284c7" stroke-width="8" stroke-linecap="round"/>
    <text x="615" y="290" text-anchor="middle" class="boxTitle">Controller</text>
  </g>

  <!-- Service -->
  <g filter="url(#shadow)">
    <rect x="815" y="130" width="170" height="120" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <circle cx="900" cy="190" r="31" fill="#bbf7d0"/>
    <path d="M900 158 V222 M868 190 H932 M878 168 L922 212 M922 168 L878 212" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <text x="900" y="290" text-anchor="middle" class="boxTitle">Service</text>
  </g>

  <!-- Interceptor after -->
  <g filter="url(#shadow)">
    <rect x="530" y="380" width="250" height="120" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
    <text x="655" y="426" text-anchor="middle" class="boxTitle">Same Interceptor</text>
    <text x="655" y="455" text-anchor="middle" class="small">after</text>
    <text x="655" y="478" text-anchor="middle" class="tiny">change response / log time</text>
  </g>

  <!-- Response box -->
  <g filter="url(#shadow)">
    <rect x="960" y="380" width="170" height="80" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="1045" y="428" text-anchor="middle" class="boxTitle">Response</text>
  </g>

  <!-- Forward arrows -->
  <path d="M195 190 H240" class="arrow"/>
  <path d="M445 190 H520" class="purple"/>
  <path d="M705 190 H805" class="arrow"/>

  <!-- Return arrows -->
  <path d="M900 255 C900 340 775 350 700 380" class="return"/>
  <path d="M785 440 H950" class="purple"/>
  <path d="M960 455 C760 560 350 550 190 305" class="return"/>

  <!-- Labels -->
  <text x="218" y="170" text-anchor="middle" class="tiny">request</text>
  <text x="482" y="170" text-anchor="middle" class="tiny">passes on</text>
  <text x="755" y="170" text-anchor="middle" class="tiny">calls</text>
  <text x="820" y="345" text-anchor="middle" class="tiny">result comes back</text>
  <text x="870" y="420" text-anchor="middle" class="tiny">final response</text>

  <!-- Bottom note inside image -->
  <text x="600" y="555" text-anchor="middle" class="small">Interceptor wraps around the route: it can run before and after controller/service work.</text>
</svg>
