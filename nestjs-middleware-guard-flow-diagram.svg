<svg width="1000" height="760" viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boxText { font: 700 18px Arial, sans-serif; fill: #111827; }
      .smallText { font: 14px Arial, sans-serif; fill: #374151; }
      .noteText { font: 15px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashArrow { stroke: #dc2626; stroke-width: 3; fill: none; stroke-dasharray: 8 6; marker-end: url(#redArrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker id="redArrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f9fafb"/>

  <text x="500" y="50" text-anchor="middle" class="title">NestJS Request Flow: Middleware vs Guard</text>
  <text x="500" y="78" text-anchor="middle" class="subtitle">Middleware prepares the request; Guard decides whether route access is allowed.</text>

  <!-- Main vertical flow -->
  <rect x="340" y="115" width="320" height="70" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="145" text-anchor="middle" class="boxText">Incoming Request</text>
  <text x="500" y="168" text-anchor="middle" class="smallText">client calls API endpoint</text>

  <path d="M500 185 L500 225" class="arrow"/>

  <rect x="340" y="225" width="320" height="88" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="257" text-anchor="middle" class="boxText">Middleware</text>
  <text x="500" y="281" text-anchor="middle" class="smallText">logging, modify req, read headers</text>
  <text x="500" y="300" text-anchor="middle" class="smallText">must call next()</text>

  <path d="M500 313 L500 355" class="arrow"/>

  <rect x="340" y="355" width="320" height="88" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="387" text-anchor="middle" class="boxText">Guard</text>
  <text x="500" y="411" text-anchor="middle" class="smallText">authentication / authorization</text>
  <text x="500" y="430" text-anchor="middle" class="smallText">canActivate(): true or false</text>

  <!-- Rejection path -->
  <path d="M660 399 C760 399, 760 505, 660 505" class="dashArrow"/>
  <rect x="690" y="455" width="230" height="100" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="805" y="490" text-anchor="middle" class="boxText">false / error</text>
  <text x="805" y="516" text-anchor="middle" class="smallText">request is rejected</text>
  <text x="805" y="536" text-anchor="middle" class="smallText">403 Forbidden / exception</text>

  <text x="535" y="475" class="noteText">true</text>
  <path d="M500 443 L500 505" class="arrow"/>

  <rect x="340" y="505" width="320" height="78" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="500" y="538" text-anchor="middle" class="boxText">Controller Route Handler</text>
  <text x="500" y="562" text-anchor="middle" class="smallText">executes business logic / calls service</text>

  <path d="M500 583 L500 625" class="arrow"/>

  <rect x="340" y="625" width="320" height="70" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="500" y="655" text-anchor="middle" class="boxText">Response</text>
  <text x="500" y="678" text-anchor="middle" class="smallText">sent back to client</text>

  <!-- Side notes -->
  <rect x="70" y="235" width="225" height="95" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="182" y="265" text-anchor="middle" class="boxText">Middleware</text>
  <text x="182" y="292" text-anchor="middle" class="smallText">“Prepare/check request”</text>
  <text x="182" y="314" text-anchor="middle" class="smallText">Runs before guards</text>

  <rect x="70" y="365" width="225" height="95" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="182" y="395" text-anchor="middle" class="boxText">Guard</text>
  <text x="182" y="422" text-anchor="middle" class="smallText">“Allow or block route”</text>
  <text x="182" y="444" text-anchor="middle" class="smallText">Runs before controller</text>

  <text x="500" y="730" text-anchor="middle" class="subtitle">Simple version: Request → Middleware → Guard → Controller → Response</text>
</svg>
